name: Deploy PHP app to Bluehost

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.BLUEHOST_SSH_KEY }}
          SSH_HOST: ${{ vars.BLUEHOST_HOST }}
          SSH_USER: ${{ vars.BLUEHOST_USERNAME }}
          SSH_PORT: ${{ vars.BLUEHOST_PORT }}
        run: |
          set -euo pipefail

          PORT="${SSH_PORT:-22}"

          if [ -z "${SSH_PRIVATE_KEY:-}" ]; then
            echo "Missing BLUEHOST_SSH_KEY secret"
            exit 1
          fi

          if [ -z "${SSH_HOST:-}" ]; then
            echo "Missing BLUEHOST_HOST variable"
            exit 1
          fi

          if [ -z "${SSH_USER:-}" ]; then
            echo "Missing BLUEHOST_USERNAME variable"
            exit 1
          fi

          echo "Deploy target: ${SSH_USER}@${SSH_HOST}:${PORT}"

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/bluehost_deploy_key
          chmod 600 ~/.ssh/bluehost_deploy_key

          ssh-keyscan -p "$PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

          cat > ~/.ssh/config <<EOF
          Host bluehost
            HostName $SSH_HOST
            User $SSH_USER
            Port $PORT
            IdentityFile ~/.ssh/bluehost_deploy_key
            IdentitiesOnly yes
            IdentityAgent none
            StrictHostKeyChecking yes
          EOF

          chmod 600 ~/.ssh/config

          ssh bluehost "echo 'SSH OK'; pwd"

      - name: Prepare Bluehost directories
        env:
          BLUEHOST_PUBLIC_PATH: ${{ vars.BLUEHOST_PUBLIC_PATH }}
          BLUEHOST_PRIVATE_PATH: ${{ vars.BLUEHOST_PRIVATE_PATH }}
        run: |
          set -euo pipefail

          ssh bluehost "
            mkdir -p '$BLUEHOST_PUBLIC_PATH'
            mkdir -p '$BLUEHOST_PRIVATE_PATH'
            mkdir -p '$BLUEHOST_PRIVATE_PATH/storage'
            mkdir -p '$BLUEHOST_PRIVATE_PATH/logs'
            chmod 700 '$BLUEHOST_PRIVATE_PATH/storage'
            chmod 700 '$BLUEHOST_PRIVATE_PATH/logs'
          "

      - name: Deploy public files
        env:
          BLUEHOST_PUBLIC_PATH: ${{ vars.BLUEHOST_PUBLIC_PATH }}
        run: |
          set -euo pipefail

          rsync -az --delete \
            -e "ssh" \
            public/ \
            bluehost:"$BLUEHOST_PUBLIC_PATH"/

      - name: Deploy private app files
        env:
          BLUEHOST_PRIVATE_PATH: ${{ vars.BLUEHOST_PRIVATE_PATH }}
        run: |
          set -euo pipefail

          rsync -az --delete \
            -e "ssh" \
            app/ \
            bluehost:"$BLUEHOST_PRIVATE_PATH/app"/

          rsync -az \
            -e "ssh" \
            cron_check.php .env.example \
            bluehost:"$BLUEHOST_PRIVATE_PATH"/

      - name: Finalize permissions
        env:
          BLUEHOST_PUBLIC_PATH: ${{ vars.BLUEHOST_PUBLIC_PATH }}
          BLUEHOST_PRIVATE_PATH: ${{ vars.BLUEHOST_PRIVATE_PATH }}
        run: |
          set -euo pipefail

          ssh bluehost "
            find '$BLUEHOST_PUBLIC_PATH' -type d -exec chmod 755 {} \;
            find '$BLUEHOST_PUBLIC_PATH' -type f -exec chmod 644 {} \;

            find '$BLUEHOST_PRIVATE_PATH/app' -type d -exec chmod 755 {} \;
            find '$BLUEHOST_PRIVATE_PATH/app' -type f -exec chmod 644 {} \;

            chmod 644 '$BLUEHOST_PRIVATE_PATH/cron_check.php'
            chmod 644 '$BLUEHOST_PRIVATE_PATH/.env.example'

            if [ -f '$BLUEHOST_PRIVATE_PATH/.env' ]; then chmod 600 '$BLUEHOST_PRIVATE_PATH/.env'; fi
            if [ -f '$BLUEHOST_PRIVATE_PATH/storage/headers.json' ]; then chmod 600 '$BLUEHOST_PRIVATE_PATH/storage/headers.json'; fi
          "