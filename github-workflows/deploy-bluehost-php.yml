name: Deploy PHP app to Bluehost

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Uncomment this ONLY if your variables are under:
    # Settings > Environments > production
    # environment: production

    env:
      BLUEHOST_HOST: ${{ vars.BLUEHOST_HOST }}
      BLUEHOST_USERNAME: ${{ vars.BLUEHOST_USERNAME }}
      BLUEHOST_PORT: ${{ vars.BLUEHOST_PORT }}
      BLUEHOST_PUBLIC_PATH: ${{ vars.BLUEHOST_PUBLIC_PATH }}
      BLUEHOST_PRIVATE_PATH: ${{ vars.BLUEHOST_PRIVATE_PATH }}

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Validate deployment config
        env:
          SSH_PRIVATE_KEY: ${{ secrets.BLUEHOST_SSH_KEY }}
        run: |
          set -euo pipefail

          require_env() {
            local name="$1"
            local value="${!name:-}"
            if [ -z "$value" ]; then
              echo "::error::$name is missing or empty"
              exit 1
            fi
          }

          require_env SSH_PRIVATE_KEY
          require_env BLUEHOST_HOST
          require_env BLUEHOST_USERNAME
          require_env BLUEHOST_PUBLIC_PATH
          require_env BLUEHOST_PRIVATE_PATH

          echo "BLUEHOST_HOST is set"
          echo "BLUEHOST_USERNAME is set"
          echo "BLUEHOST_PUBLIC_PATH is set"
          echo "BLUEHOST_PRIVATE_PATH is set"
          echo "BLUEHOST_PORT=${BLUEHOST_PORT:-22}"

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.BLUEHOST_SSH_KEY }}
        run: |
          set -euo pipefail

          PORT="${BLUEHOST_PORT:-22}"

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/bluehost_deploy_key
          chmod 600 ~/.ssh/bluehost_deploy_key

          ssh-keyscan -T 30 -p "$PORT" -H "$BLUEHOST_HOST" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

          cat > ~/.ssh/config <<EOF
          Host bluehost
            HostName $BLUEHOST_HOST
            User $BLUEHOST_USERNAME
            Port $PORT
            IdentityFile ~/.ssh/bluehost_deploy_key
            IdentitiesOnly yes
            IdentityAgent none
            StrictHostKeyChecking yes
          EOF

          chmod 600 ~/.ssh/config

          ssh bluehost "echo 'SSH OK'; pwd"

      - name: Prepare Bluehost directories
        run: |
          set -euo pipefail

          ssh bluehost "
            mkdir -p '$BLUEHOST_PUBLIC_PATH' &&
            mkdir -p '$BLUEHOST_PRIVATE_PATH' &&
            mkdir -p '$BLUEHOST_PRIVATE_PATH/storage' &&
            mkdir -p '$BLUEHOST_PRIVATE_PATH/logs' &&
            chmod 700 '$BLUEHOST_PRIVATE_PATH/storage' &&
            chmod 700 '$BLUEHOST_PRIVATE_PATH/logs'
          "

      - name: Deploy public files
        run: |
          set -euo pipefail

          rsync -az --delete \
            -e "ssh" \
            public/ \
            bluehost:"$BLUEHOST_PUBLIC_PATH"/

      - name: Deploy private app files
        run: |
          set -euo pipefail

          rsync -az --delete \
            -e "ssh" \
            app/ \
            bluehost:"$BLUEHOST_PRIVATE_PATH/app"/

          rsync -az \
            -e "ssh" \
            cron_check.php .env.example \
            bluehost:"$BLUEHOST_PRIVATE_PATH"/

      - name: Finalize permissions
        run: |
          set -euo pipefail

          ssh bluehost "
            find '$BLUEHOST_PUBLIC_PATH' -type d -exec chmod 755 {} \; &&
            find '$BLUEHOST_PUBLIC_PATH' -type f -exec chmod 644 {} \; &&

            find '$BLUEHOST_PRIVATE_PATH/app' -type d -exec chmod 755 {} \; &&
            find '$BLUEHOST_PRIVATE_PATH/app' -type f -exec chmod 644 {} \; &&

            chmod 644 '$BLUEHOST_PRIVATE_PATH/cron_check.php' &&
            chmod 644 '$BLUEHOST_PRIVATE_PATH/.env.example' &&

            if [ -f '$BLUEHOST_PRIVATE_PATH/.env' ]; then chmod 600 '$BLUEHOST_PRIVATE_PATH/.env'; fi &&
            if [ -f '$BLUEHOST_PRIVATE_PATH/storage/headers.json' ]; then chmod 600 '$BLUEHOST_PRIVATE_PATH/storage/headers.json'; fi
          "